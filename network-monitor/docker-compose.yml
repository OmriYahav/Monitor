services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-monitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monitor}
      POSTGRES_DB: ${POSTGRES_DB:-monitor}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monitor} -d ${POSTGRES_DB:-monitor}"]
      interval: 5s
      timeout: 5s
      retries: 10
  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://monitor:monitor@postgres:5432/monitor}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-admin@example.com}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-ChangeMe123!}
      INITIAL_ADMIN_NAME: ${INITIAL_ADMIN_NAME:-Network Monitor Admin}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
  worker:
    build: ./backend
    command: ["python", "/worker/worker.py"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://monitor:monitor@postgres:5432/monitor}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-admin@example.com}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-ChangeMe123!}
      INITIAL_ADMIN_NAME: ${INITIAL_ADMIN_NAME:-Network Monitor Admin}
    volumes:
      - ./worker:/worker:ro
      - ./backend:/backend:ro
    depends_on:
      postgres:
        condition: service_healthy
  frontend:
    build: ./frontend
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
volumes:
  postgres_data:
